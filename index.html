<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1411" />
    <meta name="description" content="Drive a beat-up SUV from Los Angeles to San Salvador as fiat inflates and Bitcoin appreciates." />
    <title>🛻₿ Bitcoin Road Trip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inconsolata:wght@400;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <div id="loader" style="
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #1a1411; z-index: 9999;
        font-family: 'Inconsolata', monospace; color: #f5e6ca;
        transition: opacity 0.4s ease;
      ">
        <div style="font-size: 64px; animation: pulse 1.2s ease-in-out infinite;">🛻</div>
        <div style="
          font-size: 14px; letter-spacing: 0.2em; margin-top: 12px;
          color: #f7931a; animation: pulse 1.2s ease-in-out 0.15s infinite;
        ">STARTING ENGINE…</div>
        <div style="
          width: 140px; height: 3px; margin-top: 16px;
          background: rgba(247,147,26,0.2); border-radius: 2px; overflow: hidden;
        ">
          <div style="
            height: 100%; width: 40%;
            background: var(--btc, #f7931a); border-radius: 2px;
            animation: loadBar 2s ease-in-out infinite;
          "></div>
        </div>
        <style>
          @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.96); }
            50% { opacity: 1; transform: scale(1); }
          }
          @keyframes loadBar {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(180%); }
            100% { transform: translateX(-100%); }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/appEntryPoint.jsx"></script>
  </body>
</html>
